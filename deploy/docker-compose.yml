services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-athletiq}
      POSTGRES_USER: ${POSTGRES_USER:-athletiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env.pi}
    volumes:
      - athletiq_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-athletiq} -d ${POSTGRES_DB:-athletiq}"]
      interval: 10s
      timeout: 5s
      retries: 5

  openehr-db:
    image: ehrbase/ehrbase-v2-postgres:16.2
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${OPENEHR_DB_PASSWORD:-postgres}
      EHRBASE_USER_ADMIN: ehrbase
      EHRBASE_PASSWORD_ADMIN: ${EHRBASE_ADMIN_PASSWORD:-ehrbase}
      EHRBASE_USER: ehrbase_restricted
      EHRBASE_PASSWORD: ${EHRBASE_PASSWORD:-ehrbase_restricted}
    volumes:
      - athletiq_openehr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 12

  openehr:
    image: ehrbase/ehrbase:latest
    restart: unless-stopped
    depends_on:
      openehr-db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://openehr-db:5432/ehrbase
      DB_USER: ehrbase_restricted
      DB_PASS: ${EHRBASE_PASSWORD:-ehrbase_restricted}
      DB_USER_ADMIN: ehrbase
      DB_PASS_ADMIN: ${EHRBASE_ADMIN_PASSWORD:-ehrbase}
      SERVER_NODENAME: local.ehrbase.org
      SPRING_PROFILES_ACTIVE: local
      ADMIN_API_ACTIVE: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ehrbase/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 30s

  api:
    build:
      context: ../../AthletIQ-Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      openehr:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-athletiq};Username=${POSTGRES_USER:-athletiq};Password=${POSTGRES_PASSWORD}
      OpenEhr__BaseUrl: http://openehr:8080/ehrbase
      JwtOptions__SecretKey: ${JWT_SECRET:?Set JWT_SECRET in deploy/.env.pi}
      JwtOptions__Issuer: ${JWT_ISSUER:-AthletIQ}
      JwtOptions__Audience: ${JWT_AUDIENCE:-AthletIQ}
      JwtOptions__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES:-60}
      SeedData__RunOnStartup: ${SEED_ON_STARTUP:-false}
    ports:
      - "${API_PORT:-8080}:8080"
    networks:
      default: {}
      web:
        aliases:
          - athletiq-api
    healthcheck:
      # aspnet image has no wget/curl; bash /dev/tcp works in the Debian-based runtime
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /health HTTP/1.0\\r\\n\\r\\n\" >&3 && head -1 <&3 | grep -q \"200\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ../../AthletIQ-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-same-origin}
        BACKEND_URL: http://api:8080
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      BACKEND_URL: http://api:8080
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-5000}:3000"
    networks:
      default: {}
      web:
        aliases:
          - athletiq-frontend

  landingpage:
    container_name: athletiq-landing
    build:
      context: ../../AthletIQ-Landingpage
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${LANDINGPAGE_PORT:-8081}:80"
    networks:
      web:
        aliases:
          - athletiq-landing

volumes:
  athletiq_postgres_data:
  athletiq_openehr_postgres_data:

networks:
  web:
    external: true
