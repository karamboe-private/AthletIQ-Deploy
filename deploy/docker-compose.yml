services:
  postgres:
    image: postgres:17-alpine
    container_name: athletiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-athletiq}
      POSTGRES_USER: ${POSTGRES_USER:-athletiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env.pi}
    volumes:
      - athletiq_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-athletiq} -d ${POSTGRES_DB:-athletiq}"]
      interval: 10s
      timeout: 5s
      retries: 5

  hapi-fhir-db:
    image: postgres:16-alpine
    container_name: athletiq_hapi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hapi
      POSTGRES_USER: hapi
      POSTGRES_PASSWORD: ${HAPI_DB_PASSWORD:-hapi_secret}
    volumes:
      - athletiq_hapi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hapi -d hapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: athletiq_hapi_fhir
    restart: unless-stopped
    depends_on:
      hapi-fhir-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://hapi-fhir-db:5432/hapi
      SPRING_DATASOURCE_USERNAME: hapi
      SPRING_DATASOURCE_PASSWORD: ${HAPI_DB_PASSWORD:-hapi_secret}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      HIBERNATE_DIALECT: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
    healthcheck:
      test: ["CMD", "java", "-cp", "/app", "HealthCheck"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s

  api:
    build:
      context: ../../AthletIQ-Backend
      dockerfile: Dockerfile
    container_name: athletiq_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      hapi-fhir:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-athletiq};Username=${POSTGRES_USER:-athletiq};Password=${POSTGRES_PASSWORD}
      HapiFhir__BaseUrl: http://hapi-fhir:8080/fhir
      JwtOptions__SecretKey: ${JWT_SECRET:?Set JWT_SECRET in deploy/.env.pi}
      JwtOptions__Issuer: ${JWT_ISSUER:-AthletIQ}
      JwtOptions__Audience: ${JWT_AUDIENCE:-AthletIQ}
      JwtOptions__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES:-60}
      SeedData__RunOnStartup: ${SEED_ON_STARTUP:-false}
    ports:
      - "${API_PORT:-8082}:8080"
    networks:
      default: {}
      web:
        aliases:
          - athletiq-api
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s

  frontend:
    container_name: athletiq_frontend
    build:
      context: ../../AthletIQ-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-same-origin}
        BACKEND_URL: http://api:8080
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      BACKEND_URL: http://api:8080
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-5000}:3000"
    networks:
      default: {}
      web:
        aliases:
          - athletiq-frontend

  landingpage:
    container_name: athletiq-landing
    build:
      context: ../../AthletIQ-Landingpage
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${LANDINGPAGE_PORT:-8081}:80"
    networks:
      web:
        aliases:
          - athletiq-landing

volumes:
  athletiq_postgres_data:
  athletiq_hapi_postgres_data:

networks:
  web:
    external: true
